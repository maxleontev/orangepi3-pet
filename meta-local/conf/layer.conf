# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-local"
BBFILE_PATTERN_meta-local = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-local = "6"

LAYERDEPENDS_meta-local = "core"
LAYERSERIES_COMPAT_meta-local = "scarthgap"

ERROR_QA:remove = "patch-status"

# switch on wifi for ap6256
CONFIG_BRCMUTIL="y"
CONFIG_BRCMFMAC="y"
CONFIG_BRCMFMAC_SDIO="y"

IMAGE_INSTALL:append = " fw-ap6256"

IMAGE_INSTALL:append = " wpa-supplicant iw"

IMAGE_INSTALL:append = " wifi-init"
