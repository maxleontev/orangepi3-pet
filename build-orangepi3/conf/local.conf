MACHINE ?= "orange-pi-3lts"
DISTRO ?= "poky"

PACKAGE_CLASSES ?= "package_deb"
#EXTRA_IMAGE_FEATURES ?= "allow-empty-password allow-root-login empty-root-password ssh-server-dropbear debug-tweaks"

EXTRA_IMAGE_FEATURES ?= "allow-empty-password allow-root-login empty-root-password"


BB_NUMBER_THREADS ?= "32"
PARALLEL_MAKE ?= "-j32"

DL_DIR ?= "${TOPDIR}/downloads"
SSTATE_DIR ?= "${TOPDIR}/sstate-cache"


BB_DISKMON_DIRS ??= "\
    STOPTASKS,${TMPDIR},1G,100K \
    STOPTASKS,${DL_DIR},1G,100K \
    STOPTASKS,${SSTATE_DIR},1G,100K \
    STOPTASKS,/tmp,100M,100K \
    HALT,${TMPDIR},100M,1K \
    HALT,${DL_DIR},100M,1K \
    HALT,${SSTATE_DIR},100M,1K \
    HALT,/tmp,10M,1K"


CONF_VERSION = "2"

BBMASK += "meta-sdr/recipes-applications/gqrx/"
BBMASK += "meta-sdr/recipes-core/gnuradio/"


INIT_MANAGER = "systemd"
DISTRO_FEATURES:append = " systemd "
VIRTUAL-RUNTIME_init_manager = "systemd"


# Force dropbear to allow passwords (remove -s flag)
# DROPBEAR_EXTRA_ARGS = "-r ${sysconfdir}/dropbear/dropbear_rsa_host_key"

